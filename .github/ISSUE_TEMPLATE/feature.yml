name: "✨ Feature Request"
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill in the details below.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature.
      placeholder: Briefly describe the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Problem
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List the conditions that must be met for this feature to be considered done.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Customer UI
        - Admin UI
        - API / Backend
        - Shopify Integration
        - Database / Prisma
        - Authentication
        - DevOps / CI
        - Other
    validations:
      required: true
